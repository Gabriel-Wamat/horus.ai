services:
  api:
    build:
      context: .
      target: server-runtime
    environment:
      NODE_ENV: production
      HORUS_ENV: ${HORUS_ENV:-local}
      HOST: ${HORUS_API_BIND_HOST:-0.0.0.0}
      PORT: ${HORUS_API_CONTAINER_PORT:-3000}
      HORUS_REPOSITORY_ROOT: ${HORUS_REPOSITORY_ROOT:-/app}
      PERSISTENCE_DRIVER: ${PERSISTENCE_DRIVER:-file}
      HORUS_ALLOW_FILE_DRIVER_IN_PRODUCTION: ${HORUS_ALLOW_FILE_DRIVER_IN_PRODUCTION:-true}
      HORUS_DATA_DIR: ${HORUS_DATA_DIR:-/app/.horus/data}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_MODEL: ${LLM_MODEL:-}
      FRONT_AGENT_TIMEOUT_MS: ${FRONT_AGENT_TIMEOUT_MS:-60000}
      QA_AGENT_LLM_TIMEOUT_MS: ${QA_AGENT_LLM_TIMEOUT_MS:-45000}
      HORUS_GENERATED_PROJECT_PREVIEW_BIND_HOST: ${HORUS_GENERATED_PROJECT_PREVIEW_BIND_HOST:-0.0.0.0}
      HORUS_GENERATED_PROJECT_PREVIEW_PUBLIC_HOST: ${HORUS_GENERATED_PROJECT_PREVIEW_PUBLIC_HOST:-${HORUS_PUBLIC_HOST:?Set HORUS_PUBLIC_HOST to the browser-facing host for generated previews}}
      HORUS_GENERATED_PROJECT_PREVIEW_BASE_PORT: ${HORUS_GENERATED_PROJECT_PREVIEW_BASE_PORT:-5184}
      HORUS_HEALTHCHECK_HOST: ${HORUS_API_HEALTHCHECK_HOST:-api}
      DATABASE_URL: ${DATABASE_URL:-postgres://horus:horus@postgres:5432/horus}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    volumes:
      - horus-data:${HORUS_DATA_DIR:-/app/.horus/data}
    ports:
      - "${HORUS_API_HOST_PORT:-3001}:${HORUS_API_CONTAINER_PORT:-3000}"
      - "${HORUS_GENERATED_PROJECT_PREVIEW_PORT_RANGE:-5184-6184}:${HORUS_GENERATED_PROJECT_PREVIEW_PORT_RANGE:-5184-6184}"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const host=process.env.HORUS_HEALTHCHECK_HOST||require('node:os').hostname();const port=process.env.PORT||'3000';fetch('http://'+host+':'+port+'/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  postgres:
    image: postgres:16-alpine
    profiles: ["postgres"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-horus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-horus}
      POSTGRES_DB: ${POSTGRES_DB:-horus}
    volumes:
      - horus-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 12

  migrate:
    build:
      context: .
      target: server-runtime
    profiles: ["postgres"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PERSISTENCE_DRIVER: postgres
      DATABASE_URL: ${DATABASE_URL:-postgres://horus:horus@postgres:5432/horus}
    command: ["node", "dist/infrastructure/database/migrateCli.js"]
    restart: "no"

  web:
    build:
      context: .
      target: web-runtime
    environment:
      NGINX_PORT: ${HORUS_WEB_CONTAINER_PORT:-8080}
      HORUS_HEALTHCHECK_HOST: ${HORUS_WEB_HEALTHCHECK_HOST:-web}
      HORUS_API_UPSTREAM_HOST: ${HORUS_API_UPSTREAM_HOST:-api}
      HORUS_API_UPSTREAM_PORT: ${HORUS_API_CONTAINER_PORT:-3000}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${HORUS_WEB_HOST_PORT:-8080}:${HORUS_WEB_CONTAINER_PORT:-8080}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "host=\"$${HORUS_HEALTHCHECK_HOST:-$$(hostname)}\"; wget -qO- \"http://$${host}:$${NGINX_PORT:-8080}/\" >/dev/null",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  horus-data:
  horus-postgres:
