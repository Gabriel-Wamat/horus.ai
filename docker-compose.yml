services:
  api:
    build:
      context: .
      target: server-runtime
    environment:
      NODE_ENV: production
      HORUS_ENV: local
      HOST: 0.0.0.0
      PORT: 3000
      HORUS_REPOSITORY_ROOT: /app
      PERSISTENCE_DRIVER: file
      HORUS_DATA_DIR: /app/.horus/data
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_MODEL: ${LLM_MODEL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    volumes:
      - horus-data:/app/.horus/data
    ports:
      - "3001:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  web:
    build:
      context: .
      target: web-runtime
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      BACKEND_URL: http://api:3000
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  horus-data:
