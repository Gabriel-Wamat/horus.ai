services:
  api:
    build:
      context: .
      target: server-runtime
    environment:
      NODE_ENV: production
      HORUS_ENV: local
      HOST: 0.0.0.0
      PORT: 3000
      HORUS_REPOSITORY_ROOT: /app
      PERSISTENCE_DRIVER: ${PERSISTENCE_DRIVER:-file}
      HORUS_ALLOW_FILE_DRIVER_IN_PRODUCTION: ${HORUS_ALLOW_FILE_DRIVER_IN_PRODUCTION:-true}
      HORUS_DATA_DIR: /app/.horus/data
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_MODEL: ${LLM_MODEL:-}
      FRONT_AGENT_TIMEOUT_MS: ${FRONT_AGENT_TIMEOUT_MS:-60000}
      QA_AGENT_LLM_TIMEOUT_MS: ${QA_AGENT_LLM_TIMEOUT_MS:-45000}
      HORUS_GENERATED_PROJECT_PREVIEW_BIND_HOST: 0.0.0.0
      HORUS_GENERATED_PROJECT_PREVIEW_PUBLIC_HOST: ${HORUS_GENERATED_PROJECT_PREVIEW_PUBLIC_HOST:-localhost}
      DATABASE_URL: ${DATABASE_URL:-postgres://horus:horus@postgres:5432/horus}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    volumes:
      - horus-data:/app/.horus/data
    ports:
      - "3001:3000"
      - "5184-6184:5184-6184"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  postgres:
    image: postgres:16-alpine
    profiles: ["postgres"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-horus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-horus}
      POSTGRES_DB: ${POSTGRES_DB:-horus}
    volumes:
      - horus-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 12

  migrate:
    build:
      context: .
      target: server-runtime
    profiles: ["postgres"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PERSISTENCE_DRIVER: postgres
      DATABASE_URL: ${DATABASE_URL:-postgres://horus:horus@postgres:5432/horus}
    command: ["node", "dist/infrastructure/database/migrateCli.js"]
    restart: "no"

  web:
    build:
      context: .
      target: web-runtime
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  horus-data:
  horus-postgres:
